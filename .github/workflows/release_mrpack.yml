name: Build Modrinth Pack

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: modpack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: false

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Refresh packwiz index
        run: packwiz refresh

      - name: Build mrpack
        run: packwiz modrinth export --output NekosLife.mrpack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NekosLife-${{ github.sha }}
          path: NekosLife.mrpack
          retention-days: 30

      - name: Move snapshot tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag --force snapshot "$GITHUB_SHA"
          git push --force origin snapshot

      - name: Update snapshot release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: snapshot
          name: Latest main build
          prerelease: true
          make_latest: "false"
          overwrite_files: true
          files: NekosLife.mrpack
          body: |
            Automatically built from commit `${{ github.sha }}`.

      - name: Create version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: NekosLife.mrpack
          overwrite_files: true
          generate_release_notes: true
          make_latest: "true"
